services:
  db:
    image: postgis/postgis:18-3.6
    environment:
      POSTGRES_DB: boundaries
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    volumes:
      - pg:/var/lib/postgresql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 5

  runner:
    build:
      context: .
      dockerfile: Dockerfile
    working_dir: /app
    volumes:
      - ./:/app
    environment:
      DATABASE_URL: postgresql://postgres:postgres@db:5432/boundaries
    depends_on:
      db:
        condition: service_healthy
    command: ["sh", "-c", "uv run python import_nlsc.py && uv run python import_osm.py && uv run python compare.py"]

volumes:
  pg:
